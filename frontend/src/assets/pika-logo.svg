<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary Gradient -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>

    <!-- Glow Gradient -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0" />
    </radialGradient>

    <!-- Card Pattern -->
    <pattern id="cardPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="20" r="1" fill="white" opacity="0.1"/>
      <circle cx="90" cy="80" r="1.5" fill="white" opacity="0.1"/>
      <circle cx="50" cy="50" r="0.8" fill="white" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background Glow -->
  <circle cx="100" cy="100" r="80" fill="url(#glowGradient)"/>

  <!-- Main Card Shape -->
  <rect x="40" y="50" width="120" height="100" rx="16" fill="url(#primaryGradient)"/>

  <!-- Card Pattern Overlay -->
  <rect x="40" y="50" width="120" height="100" rx="16" fill="url(#cardPattern)"/>

  <!-- Lightning Bolt / Payment Symbol -->
  <path d="M100 65 L90 95 L105 95 L100 115 L110 85 L95 85 Z"
        fill="white"
        stroke="white"
        stroke-width="2"
        stroke-linejoin="round"
        class="lightning-icon"/>

  <!-- Chip Icon -->
  <rect x="55" y="90" width="20" height="16" rx="3" fill="white" opacity="0.3"/>
  <line x1="60" y1="90" x2="60" y2="106" stroke="#8B5CF6" stroke-width="1"/>
  <line x1="65" y1="90" x2="65" y2="106" stroke="#8B5CF6" stroke-width="1"/>
  <line x1="70" y1="90" x2="70" y2="106" stroke="#8B5CF6" stroke-width="1"/>
  <line x1="55" y1="96" x2="75" y2="96" stroke="#8B5CF6" stroke-width="1"/>

  <!-- Speed Lines (Left) -->
  <line x1="30" y1="85" x2="35" y2="85" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="28" y1="95" x2="38" y2="95" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="30" y1="105" x2="35" y2="105" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Speed Lines (Right) -->
  <line x1="165" y1="85" x2="170" y2="85" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="162" y1="95" x2="172" y2="95" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="165" y1="105" x2="170" y2="105" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- PIKA Text -->
  <text x="100" y="172" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="18" fill="#1e1b4b">
    PIKA
  </text>

  <!-- Tagline -->
  <text x="100" y="188" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="9" fill="#64748b" letter-spacing="2">
    INSTANT PAYMENTS
  </text>
</svg>
